<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Concept Atlas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

:root{
  --bg:#0f1218; --bg-grid:#171b23; --panel:#161b23; --panel2:#1c222c;
  --line:#2a3140; --line-soft:#232936;
  --text:#e7ebf1; --text-dim:#8993a4; --text-faint:#5a6376;
  --accent:#f4d35e;
  --c-genre:#e0a458; --c-theme:#e37bb0; --c-mechanics:#4fb8a6;
  --c-systems:#ef6f61; --c-dimensions:#5fa8e0; --c-feel:#8fd18f; --c-artstyle:#c9a6f7;
  --diff-low:#7bc17e; --diff-mid:#e0b458; --diff-high:#e3705f;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:linear-gradient(var(--bg-grid) 1px,transparent 1px) 0 0/28px 28px,
             linear-gradient(90deg,var(--bg-grid) 1px,transparent 1px) 0 0/28px 28px, var(--bg);
  color:var(--text); font-family:'Inter',sans-serif; overflow:hidden;
}
::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px;} ::-webkit-scrollbar-track{background:transparent;}

#app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:60px 1fr;height:100vh;}
/* Hide it in Inspiration view since there's nothing for it to say */
#app.hide-sidebar {grid-template-columns: 0 1fr;}
#app.hide-sidebar aside {display: none;}
header{grid-column:1/3;grid-row:1;display:flex;align-items:center;gap:16px;padding:0 18px;border-bottom:1px solid var(--line);background:rgba(22,27,35,.9);z-index:30;flex-wrap:wrap;}
.brand{display:flex;align-items:baseline;gap:9px;}
.brand .mark{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:var(--accent);border:1px solid var(--accent);padding:2px 6px;border-radius:2px;}
.brand h1{font-family:'Space Grotesk';font-size:17px;font-weight:600;}
nav.view-toggle{display:flex;gap:2px;background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:2px;margin-left:auto;}
nav.view-toggle button{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;background:none;border:none;color:var(--text-dim);padding:7px 11px;border-radius:3px;cursor:pointer;white-space:nowrap;}
nav.view-toggle button.active{background:var(--accent);color:#1a1c14;font-weight:600;}
.search-wrap{position:relative;}
.search-wrap input{width:190px;background:var(--panel2);border:1px solid var(--line);color:var(--text);font-size:13px;padding:7px 9px 7px 28px;border-radius:4px;outline:none;}
.search-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.5;}

aside{grid-column:1;grid-row:2;border-right:1px solid var(--line);overflow-y:auto;padding:16px 14px 40px;background:var(--panel);}
aside h3{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin:18px 0 8px;display:flex;align-items:center;gap:8px;}
aside h3:first-child{margin-top:0;}
aside h3::after{content:'';flex:1;height:1px;background:var(--line-soft);}
.chip{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:transparent;border:1px solid var(--line-soft);color:var(--text-dim);font-size:12px;padding:6px 8px;border-radius:4px;cursor:pointer;margin-bottom:5px;}
.chip:hover{border-color:var(--line);color:var(--text);}
.chip.active{background:var(--panel2);color:var(--text);border-color:currentColor;}
.chip .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.25);}
.chip .cnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint);}
.clear-btn{width:100%;margin-top:12px;background:none;border:1px solid var(--line);color:var(--text-faint);font-family:'JetBrains Mono',monospace;font-size:10px;padding:7px;border-radius:4px;cursor:pointer;}
.legend-note{font-size:10.5px;line-height:1.5;color:var(--text-faint);margin-top:8px;padding:9px;border:1px dashed var(--line-soft);border-radius:4px;}
.diff-badge{display:inline-flex;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;font-size:10px;padding:1px 6px;border-radius:9px;border:1px solid;white-space:nowrap;}

main{grid-column:2;grid-row:2;position:relative;overflow:hidden;}
.view{position:absolute;inset:0;overflow-y:auto;display:none;}
.view.active{display:block;}
#inspireview.view.active{display:grid;grid-template-rows:0fr 1fr;}

/* ---- catalog ---- */
#explorer{padding:24px 28px 60px;}
.domain-block{margin-bottom:30px;}
.domain-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
.domain-head .sw{width:11px;height:11px;border-radius:2px;}
.domain-head h2{font-family:'Space Grotesk';font-size:16px;font-weight:600;}
.domain-head span{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-faint);}
.group-label{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin:14px 0 8px;padding-left:2px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px;}
.card{background:var(--panel2);border:1px solid var(--line-soft);border-left:3px solid var(--cc,var(--line));border-radius:4px;padding:10px 11px;cursor:pointer;}
.card:hover{border-color:var(--cc);}
.card.dim{opacity:.25;}
.card .cname{font-family:'Space Grotesk';font-size:13px;font-weight:600;margin:1px 0 4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.card .cdesc{font-size:11px;color:var(--text-dim);line-height:1.4;}
.card .expand{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text-faint);margin-top:6px;cursor:pointer;}
.card .expand:hover{color:var(--accent);}
.child-list{margin-top:7px;padding-top:7px;border-top:1px dashed var(--line-soft);display:none;}
.child-list.open{display:block;}
.child-row{font-size:10.5px;color:var(--text-dim);padding:3px 0;cursor:pointer;}
.child-row b{color:var(--text);font-weight:600;}
.child-row:hover b{color:var(--accent);}

/* ---- web ---- */
#webview svg{width:100%;height:100%;cursor:grab;}
.node circle{stroke-width:1.6px;cursor:pointer;}
.node text{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--text-dim);pointer-events:none;}
.node.faded{opacity:.1;}
.link{stroke:var(--line);stroke-width:1.1px;}
.link.rel{stroke-dasharray:2,3;stroke:var(--text-faint);}
.link.mutex { stroke:#e3705f; stroke-width:2px; stroke-dasharray:4,4; }
.link.combo{stroke:#e0925f;stroke-width:1.6px;stroke-dasharray:5,2;}
.link.faded{opacity:.04;}
.link.lit{stroke:var(--accent);opacity:1;}
.hint{position:absolute;bottom:14px;left:14px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint);background:rgba(22,27,35,.85);border:1px solid var(--line-soft);padding:7px 9px;border-radius:4px;max-width:260px;line-height:1.5;}

/* ---- detail panel ---- */
#detail{position:absolute;top:0;right:0;height:100%;width:340px;background:var(--panel);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .2s ease;overflow-y:auto;z-index:25;padding:20px 20px 40px;}
#detail.open{transform:translateX(0);}
#detail .close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-faint);font-size:18px;cursor:pointer;}
#detail .badge{display:inline-flex;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:10px;border:1px solid;margin-bottom:10px;}
#detail h2{font-family:'Space Grotesk';font-size:19px;margin:2px 0 8px;}
#detail .desc{font-size:12.5px;line-height:1.55;color:var(--text-dim);margin-bottom:14px;}
#detail .sect{margin-bottom:15px;}
#detail .sect h4{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:7px;}
#detail .rel-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 8px;border-radius:4px;cursor:pointer;border:1px solid var(--line-soft);margin-bottom:5px;background:var(--panel2);}
#detail .rel-item:hover{border-color:var(--accent);}
#detail .rel-item .sw{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
#detail .empty-note{font-size:11.5px;color:var(--text-faint);font-style:italic;}
#detail .lookup{display:inline-block;margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--accent);cursor:pointer;text-decoration:underline;}

/* ---- wizard ---- */
.wizard-container{display:grid;grid-template-columns:230px 1fr;height:100%;}
.step-nav{border-right:1px solid var(--line);overflow-y:auto;padding:16px 12px 40px;background:var(--panel);}
.step-nav .prog{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-faint);margin-bottom:12px;}
.step-domain-h{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;margin:12px 0 5px;padding-left:3px;}
.step-btn{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--text-dim);font-size:11.5px;padding:6px 7px;border-radius:4px;cursor:pointer;margin-bottom:2px;}
.step-btn:hover{background:var(--panel2);}
.step-btn.current{background:var(--panel2);color:var(--text);border-color:var(--line);}
.step-btn .mk{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--text-faint);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.step-btn.done .mk{background:var(--accent);border-color:var(--accent);color:#1a1c14;}

.wizard-main{overflow-y:auto; padding:0; position:relative;}
.wizard-content{padding:26px 34px 0;}

.wizard-bottombar{display:flex; align-items:center; gap:10px; flex-wrap:wrap;position:sticky; bottom:0; background:var(--bg); z-index:10;padding:18px 34px 26px; border-top:1px solid var(--line); margin-top:18px;}
#step-notes{flex:1; min-width:150px; min-height:32px; background:var(--panel2);border:1px solid var(--line); color:var(--text); padding:6px 9px;border-radius:4px; font-family:'Inter'; font-size:12.5px; resize:vertical;}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.03em;background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:7px 12px;border-radius:4px;cursor:pointer; height:32px; display:inline-flex; align-items:center; justify-content:center;}
.btn:hover{border-color:var(--accent);}
.btn.primary{background:var(--accent);color:#1a1c14;border-color:var(--accent);font-weight:600;}
.btn.ghost{background:none;}
.btn:disabled,.btn[disabled]{opacity:.35;cursor:default;pointer-events:none;}
.step-title{font-family:'Space Grotesk';font-size:22px;margin-bottom:4px;}
.step-sub{font-size:12.5px;color:var(--text-dim);margin-bottom:18px;}
.opt-row{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border:1px solid var(--line-soft);border-radius:5px;margin-bottom:6px;background:var(--panel2);}
.opt-row.locked{opacity:.45;}
.opt-row.checked{border-color:var(--accent);}
.opt-row.inherited{opacity:.55;border-style:dashed;}
.opt-row.broken-dep{border-color:var(--diff-high);}
.opt-row.broken-dep .oname{color:var(--diff-high);}
.opt-row.broken-dep .olock{color:var(--diff-high);}
.opt-row input{margin-top:2px;flex-shrink:0;}
.opt-row .ob{flex:1;}
.opt-row .oname{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.opt-row .odesc{font-size:11.5px;color:var(--text-dim);margin-top:2px;}
.opt-row .olock{font-size:10.5px;color:var(--text-faint);margin-top:3px;font-style:italic;}
.fib-wrap{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line-soft);}
.fib-wrap label{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);}
.fib-input{width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--text); padding:8px 10px; border-radius:4px; outline:none; font-family:'Inter',sans-serif; font-size:12.5px;}
.fib-input:focus{border-color:var(--accent);}
.suggest-box{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
.suggest-chip{font-family:'JetBrains Mono',monospace;font-size:10.5px;background:var(--panel2);border:1px solid var(--accent);color:var(--accent);padding:4px 9px;border-radius:12px;cursor:pointer;}
.suggest-chip:hover{background:var(--accent);color:#1a1c14;}
.diff-total{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:bold; color:var(--accent); display:flex; align-items:center; gap:4px; margin-left:auto;}
.inherited-box{margin-bottom:14px;padding:9px 10px;border:1px dashed var(--line-soft);border-radius:5px;font-size:11.5px;color:var(--text-faint);}
.inherited-box b{color:var(--text-dim);}
.review-cat{margin-bottom:16px;}
.review-cat h4{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;color:var(--text-dim);}
.review-chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;background:var(--panel2);border:1px solid var(--line-soft);padding:4px 9px;border-radius:12px;margin:0 5px 5px 0;cursor:pointer;transition:border-color 0.15s;}
.review-chip:hover{border-color:var(--accent);}
.feature-card{border:1px solid var(--line-soft);background:var(--panel2);border-radius:5px;padding:10px 12px;margin-bottom:8px;cursor:pointer;}
.feature-card:hover{border-color:var(--accent);}
.feature-card b{font-size:13px;}
.feature-card span{display:block;font-size:11px;color:var(--text-faint);margin-top:2px;}
.empty-state{padding:40px;text-align:center;color:var(--text-faint);font-size:13px;}
.review-notes{margin-top:16px;}
.review-notes h4{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;color:var(--text-dim);}
.review-note-details{border:1px solid var(--line-soft);background:var(--panel2);border-radius:4px;margin-bottom:6px;}
.review-note-details summary{font-size:12px;padding:7px 10px;cursor:pointer;color:var(--text-dim);list-style:none;display:flex;align-items:center;gap:6px;}
.review-note-details summary::before{content:'\25B6';font-size:9px;color:var(--text-faint);transition:transform .15s;}
.review-note-details[open] summary::before{content:'\25BC';}
.review-note-details summary .note-step{font-size:10.5px;margin-right:6px;}
.review-note-details .note-body{padding:0 10px 9px;font-size:11.5px;line-height:1.55;color:var(--text-dim);white-space:pre-wrap;word-break:break-word;}

@media (max-width:900px){
  #app{
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    position: relative;
  }
  
  /* Restructure the header items onto clean lines using flexbox and ordering */
  header {
    grid-column: 2 !important;
    padding: 10px 14px;
    height: auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }
  .mobile-toggle {
    display: flex !important;
    order: 1;
  }
  .brand {
    order: 2;
    flex-grow: 1;
  }
  nav.view-toggle {
    order: 3;
    width: 100%;
    margin-left: 0;
    overflow-x: auto;
    display: flex;
    gap: 4px;
    background: var(--panel2);
    padding: 3px;
    border-radius: 4px;
    -webkit-overflow-scrolling: touch;
  }
  nav.view-toggle button {
    flex: 1 0 auto;
    padding: 8px 10px;
    font-size: 10px;
    text-align: center;
  }
  .search-wrap {
    order: 4;
    width: 100%;
  }
  .search-wrap input {
    width: 100%;
    box-sizing: border-box;
  }

  /* Make the sidebar a full-height fixed overlay drawer */
  aside {
    grid-row: 2;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 280px;
    height: 100%;
    z-index: 100;
    background: var(--panel);
    transform: translateX(-100%);
    transition: transform .2s ease;
    box-shadow: 4px 0 15px rgba(0,0,0,0.5);
    padding: 20px 14px 40px;
  }
  #app.mobile-aside-open aside {
    transform: translateX(0);
  }
  
  /* Darken background behind the sidebar drawer when open */
  #app.mobile-aside-open::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(15, 18, 24, 0.7);
    z-index: 90;
    pointer-events: auto;
  }

  /* Core layout fix: bring the main content area back to column 1 */
  main {
    grid-column: 2 !important;
    grid-row: 2 !important;
    position: relative;
    overflow: hidden;
    height: 100%;
  }

  /* Wizard navigation panel adjustments on mobile */
  .wizard-container {
    grid-template-columns: 1fr;
	grid-template-rows: 1fr 2fr;
  }
  .step-nav {
    position: sticky;
    top: 0;
    z-index: 5;
    max-height: none;
    border-bottom: 1px solid var(--line);
    background: var(--panel) !important;
  }
  .step-nav.collapsed {
    max-height: 38px;
    overflow: hidden;
  }
  .step-nav-toggle {
    display: flex !important;
    width: 100%;
    justify-content: center;
    background: var(--panel2);
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 8px;
    cursor: pointer;
  }
  .step-nav-toggle:hover {
    color: var(--text);
  }

  #detail {
    width: 100%;
  }
  #explorer {
    padding: 16px 14px 40px;
  }
  .card-grid {
    grid-template-columns: 1fr;
  }
}
.mobile-toggle{display:none;background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px 8px;border-radius:4px;align-items:center;}
.mobile-toggle:hover{color:var(--text);}
.mobile-toggle svg{width:20px;height:20px;}
.step-nav-toggle{display:none;}
/* ---- inspiration tab ---- */
.inspire-intro {padding: 24px 28px 0; font-size: 13px; line-height: 1.6; color: var(--text-dim); margin: auto; max-width: 900px; font-family: 'Inter', sans-serif;}
.inspire-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  height: 100%;
  padding: 24px 28px;
  overflow-y: auto;
}
.inspire-col {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.inspire-col h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  border-bottom: 1px solid var(--line-soft);
  padding-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.inspire-filter-group {
  margin-bottom: 10px;
}
.inspire-filter-group h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 8px;
}
.inspire-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.inspire-chip {
  background: var(--panel2);
  border: 1px solid var(--line-soft);
  color: var(--text-dim);
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  user-select: none;
}
.inspire-chip.active {
  border-color: var(--accent);
  color: var(--text);
}
.inspire-results {
  background: var(--bg-grid);
  border: 1px dashed var(--line);
  border-radius: 4px;
  padding: 14px;
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
  min-height: 140px;
}
.inspire-word-card {
  background: var(--panel2);
  border-left: 3px solid var(--accent);
  padding: 8px 12px;
  border-radius: 0 4px 4px 0;
}
.inspire-word-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 600;
}
.inspire-word-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--text-faint);
  margin-top: 2px;
}

@media (max-width: 900px) {
  .inspire-container {
    grid-template-columns: 1fr;
    gap: 16px;
    padding: 16px 14px;
  }
}
/* ---- LLM-Guided Game Design ---- */
.llm-setup{padding:26px 34px 60px;}
.llm-setup label{display:block;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;}
.llm-setup textarea,.llm-setup input[type="text"],.llm-setup input[type="password"],.llm-setup input[type="number"]{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:4px;outline:none;font-family:'Inter',sans-serif;font-size:12.5px;}
.llm-setup textarea{min-height:90px;resize:vertical;}
.llm-setup input:focus,.llm-setup textarea:focus{border-color:var(--accent);}
.llm-setup .llm-field{margin-bottom:14px;}
.llm-api-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;}
.llm-api-key-wrap{position:relative;}
.llm-api-key-wrap input{padding-right:34px;}
.llm-key-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:15px;padding:2px 5px;border-radius:3px;line-height:1;}
.llm-key-toggle:hover{color:var(--text);}
.llm-clear-btn{margin-top:6px;}
.llm-start-row{margin-top:18px;display:flex;gap:10px;align-items:center;}

.llm-run{display:flex;flex-direction:column;height:100%;}
.llm-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:10;padding:14px 34px 12px;border-bottom:1px solid var(--line);}
.llm-progress{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-left:auto;white-space:nowrap;}
.llm-log-container{flex:1;overflow-y:auto;padding:14px 34px 14px 34px;}
.llm-save-row{display:flex;gap:10px;padding:14px 34px 26px;border-top:1px solid var(--line);background:var(--bg);position:sticky;bottom:0;z-index:10;}

.llm-log-filter{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.llm-log-filter button{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--panel2);border:1px solid var(--line-soft);color:var(--text-dim);padding:4px 9px;border-radius:3px;cursor:pointer;white-space:nowrap;min-height:30px;display:inline-flex;align-items:center;}
.llm-log-filter button.active{background:var(--accent);color:#1a1c14;border-color:var(--accent);font-weight:600;}
.llm-log-filter button:hover:not(.active){border-color:var(--line);color:var(--text);}

.llm-log-entry{border:1px solid var(--line-soft);border-radius:4px;margin-bottom:4px;background:var(--panel2);overflow:hidden;}
.llm-log-header{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;min-height:36px;user-select:none;}
.llm-log-header:hover{background:rgba(255,255,255,.02);}
.llm-status-badge{font-size:10px;padding:1px 6px;border-radius:8px;border:1px solid;flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.llm-status-badge.info{color:var(--text-dim);border-color:var(--text-faint);}
.llm-status-badge.success{color:var(--diff-low);border-color:var(--diff-low);}
.llm-status-badge.warning{color:var(--diff-mid);border-color:var(--diff-mid);}
.llm-status-badge.error{color:var(--diff-high);border-color:var(--diff-high);}
.llm-log-msg{font-size:12px;color:var(--text-dim);flex:1;line-height:1.4;}
.llm-log-chevron{color:var(--text-faint);font-size:10px;transition:transform .15s ease;flex-shrink:0;}
.llm-log-entry.expanded .llm-log-chevron{transform:rotate(90deg);}
.llm-log-detail{border-top:1px solid var(--line-soft);padding:8px 10px;display:none;font-size:11.5px;line-height:1.55;color:var(--text-dim);}
.llm-log-entry.expanded > .llm-log-detail{display:block;}
.llm-log-detail pre{background:var(--bg);border:1px solid var(--line-soft);border-radius:3px;padding:8px 10px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:10.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;margin-top:6px;color:var(--text-dim);}
.llm-log-detail .llm-detail-section{margin-bottom:8px;}
.llm-log-detail .llm-detail-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:3px;}
.llm-log-child{margin-left:14px;border-left:2px solid var(--line-soft);}
.llm-log-child .llm-log-header{padding:5px 8px;min-height:30px;}
.llm-log-timestamp{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text-faint);margin-top:4px;}
.llm-invalid-options{color:var(--diff-mid);}

@media (max-width:900px){
  .llm-setup,.llm-controls,.llm-log-container,.llm-save-row{padding-left:16px;padding-right:16px;}
  .llm-api-grid{grid-template-columns:1fr;}
}
</style>
</head>

<div id="app">
  <header>
    <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

</div>

/* ============ assemble tree, numbering, reverse maps ============ */
const ALL = [...DOMAINS, ...GROUPS, ...CONCEPTS];
const BY_ID = Object.fromEntries(ALL.map(n=>[n.id,n]));
const CHILDREN_OF = {};
ALL.forEach(n=>{ if(n.parent){ (CHILDREN_OF[n.parent]=CHILDREN_OF[n.parent]||[]).push(n.id); } });
function domainOf(node){ let n=node; while(n && n.kind!=='domain'){ n = BY_ID[n.parent]; } return n; }
function groupOf(node){ let n=node; while(n && !(n.kind==='group' || (n.kind==='domain'))){ n = BY_ID[n.parent]; } return n; }
const DOMAIN_DEFAULT_PERSP = {d_genre:['player','designer','producer'],d_theme:['designer','artist','producer'],d_mechanics:['designer','player'],d_systems:['programmer'],d_dimensions:['designer','producer'],d_feel:['designer','artist'],d_artstyle:['artist']};
function perspOf(node){ if(node.persp) return node.persp; const d=domainOf(node); return (d && DOMAIN_DEFAULT_PERSP[d.id]) || ['designer']; }

const CAT_SEEN = {};
CONCEPTS.forEach(c=>{ const d = domainOf(c); const key=d?d.id:'x'; CAT_SEEN[key]=(CAT_SEEN[key]||0)+1; c.num = String(CAT_SEEN[key]).padStart(3,'0'); });

/* Normalize deps: flatten either-or groups into individual IDs.
   deps can contain strings (hard req) or arrays of strings (pick any one). */
function flattenDeps(deps){
  const out=[];
  (deps||[]).forEach(d=>{ Array.isArray(d) ? d.forEach(id=>out.push(id)) : out.push(d); });
  return out;
}
const REQUIRED_BY = {};
CONCEPTS.forEach(c=> flattenDeps(c.deps).forEach(d=>{ (REQUIRED_BY[d]=REQUIRED_BY[d]||[]).push(c.id); }));

/* utility: fuzzy match */
function normalize(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,' ').trim(); }
function similarity(a,b){
  a=normalize(a); b=normalize(b); if(!a||b) return 0;
  if(a===b) return 1;
  if(a.includes(b)||b.includes(a)) return 0.82;
  const at=new Set(a.split(' ')), bt=new Set(b.split(' '));
  const inter=[...at].filter(x=>bt.has(x)).length;
  const union=new Set([...at,...bt]).size;
  return union? inter/union : 0;
}
function findSuggestions(text, excludeGroupId){
  if(!text || text.trim().length<2) return [];
  const res=[];
  CONCEPTS.forEach(c=>{ const s=similarity(text,c.name); if(s>0.45) res.push({node:c, score:s, sameGroup:c.parent===excludeGroupId}); });
  res.sort((a,b)=>b.score-a.score);
  return res.slice(0,5);
}

function matches(c){
  if(!state.activeDomains.has(domainOf(c).id)) return false;
  if(state.activePersp.size && !perspOf(c).some(p=>state.activePersp.has(p))) return false;
  if(state.search){ const s=state.search.toLowerCase(); if(!(c.name.toLowerCase().includes(s)||c.desc.toLowerCase().includes(s)||c.id.includes(s))) return false; }
  return true;
}

let simulation, gLink, gNode, zoomB;

// Reverse index: which concepts list `id` in their own `rel` array.
// `rel` edges are stored directionally (source: c.id, target: t) purely so
// the graph only needs one line per pair, but conceptually the relationship
// is symmetric. Anything that consumes "related concepts" for a node needs
// to look both ways, not just at that node's own `rel` array.
function relatedOf(id){
  const c = BY_ID[id];
  const out = new Set(c && c.rel ? c.rel : []);
  CONCEPTS.forEach(o=>{ if(o.id!==id && o.rel && o.rel.includes(id)) out.add(o.id); });
  return out;
}

function buildGraphData(){
  const visible = new Set(CONCEPTS.filter(matches).map(c=>c.id));
  const nodes = CONCEPTS.filter(c=>visible.has(c.id) && !CHILDREN_OF['__never']).filter(c=>visible.has(c.id)).map(c=>({...c}));
  const links=[];
  CONCEPTS.forEach(c=>{
    if(!visible.has(c.id)) return;
    if(c.parent && visible.has(c.parent)) links.push({source:c.parent,target:c.id,type:'rel'});
    flattenDeps(c.deps).forEach(t=>{ if(visible.has(t)) links.push({source:t,target:c.id,type:'dep'}); });
    c.rel.forEach(t=>{ if(visible.has(t)) links.push({source:c.id,target:t,type:'rel'}); });
    c.mutex.forEach(t => { if(visible.has(t)) links.push({source:c.id, target:t, type:'mutex'}); });
  });
  COMBO_DIFFICULTY.forEach(e=>{ const ids=e.ids; if(!ids.every(id=>visible.has(id))) return; for(let i=0;i<ids.length;i++) for(let j=i+1;j<ids.length;j++) links.push({source:ids[i],target:ids[j],type:'combo',note:e.note,extra:e.extra}); });
  return {nodes,links};
}
function degreeOf(id,links){ return links.filter(l=>(l.source.id||l.source)===id||(l.target.id||l.target)===id).length; }
function renderWeb(){
  const container=document.getElementById('webview'); const w=container.clientWidth,h=container.clientHeight;
  const {nodes,links}=buildGraphData();
  const svg=d3.select('#graph').attr('viewBox',[0,0,w,h]); svg.selectAll('*').remove();
  svg.append('defs').append('marker').attr('id','arrow').attr('viewBox','0 -4 8 8').attr('refX',16).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto').append('path').attr('d','M0,-4L8,0L0,4').attr('fill','#3a4254');
  const g=svg.append('g');
  zoomB=d3.zoom().scaleExtent([0.2,3]).on('zoom',ev=>g.attr('transform',ev.transform)); svg.call(zoomB);
  gLink=g.append('g').selectAll('line').data(links).join('line')
    .attr('class',d=>'link'+(d.type==='rel'?' rel':d.type==='combo'?' combo':''))
    .attr('marker-end',d=>d.type==='dep'?'url(#arrow)':null);
  gLink = g.select('g') ? gLink : gLink; // noop guard
  g.selectAll('line').append('title').text(d=> d.type==='combo' ? `${d.extra>0?'+':''}${d.extra} difficulty together: ${d.note}` : '');
  gNode=g.append('g').selectAll('g').data(nodes,d=>d.id).join('g').attr('class','node')
    .call(d3.drag()
      .on('start',(ev,d)=>{ if(!ev.active) simulation.alphaTarget(.25).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',(ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
      .on('end',(ev,d)=>{ if(!ev.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));
  gNode.append('circle').attr('r',d=>6+Math.min(10,degreeOf(d.id,links)*1.3)).attr('fill',d=>domainOf(d).hex+'33').attr('stroke',d=>domainOf(d).hex);
  gNode.append('text').attr('dy',d=>-(9+Math.min(10,degreeOf(d.id,links)*1.3))).attr('text-anchor','middle').text(d=>d.name.length>20?d.name.slice(0,18)+'\u2026':d.name);
  gNode.on('click',(ev,d)=>{ ev.stopPropagation(); openDetail(d.id,true); });
  gNode.append('title').text(d=>d.desc);
  simulation=d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(65).strength(.3))
    .force('charge', d3.forceManyBody().strength(-130))
    .force('center', d3.forceCenter(w/2,h/2))
    .force('collision', d3.forceCollide().radius(28))
    // Gentle, continuous pull toward the center on both axes. Unlike a
    // hard radial clamp (which only acts on nodes past some threshold
    // radius), this counteracts the charge force's outward push at every
    // distance, so the layout settles into a stable blob instead of nodes
    // drifting outward under mutual repulsion until they all pile up on a
    // boundary circle. It also keeps working the same way while dragging
    // reheats the simulation (alphaTarget(.25)), so drags don't trigger a
    // fresh outward expansion/ring each time.
    .force('x', d3.forceX(w/2).strength(0.03))
    .force('y', d3.forceY(h/2).strength(0.03))
    .on('tick', ()=>{ g.selectAll('line').attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y); gNode.attr('transform',d=>`translate(${d.x},${d.y})`); });
  gLink = g.selectAll('line');
  if(state.selected) highlightNeighbors(state.selected);
}
function highlightNeighbors(id){
  if(!gNode) return; const c=BY_ID[id]; if(!c) return;
  const neigh=new Set([id, ...flattenDeps(c.deps), ...relatedOf(id), ...(REQUIRED_BY[id]||[]), ...comboEdgesFor(id).flatMap(e=>e.ids.filter(i=>i!==id)), ...(BY_ID[c.parent]?.kind==='concept'?[c.parent]:[]), ...(CHILDREN_OF[id]||[])]);
  gNode.classed('faded', d=>!neigh.has(d.id));
  gLink.classed('faded', l=>{ const s=l.source.id||l.source,t=l.target.id||l.target; return !(neigh.has(s)&&neigh.has(t)); });
  gLink.classed('lit', l=>{ const s=l.source.id||l.source,t=l.target.id||l.target; return s===id||t===id; });
}
function clearHighlight(){ if(!gNode) return; gNode.classed('faded',false); gLink.classed('faded',false).classed('lit',false); }

============================================================= */
function diffBadge(min, max, sMin, sMax){
  const v = max || min; 
  let color = v <= 3 ? 'var(--diff-low)' : v <= 6 ? 'var(--diff-mid)' : 'var(--diff-high)';
  if (sMin !== undefined && sMax !== undefined) {
    if (v === sMax && sMax > sMin) color = '#d2a8ff';
    else {
      const ratio = sMax === sMin ? 0 : (v - sMin) / (sMax - sMin);
      color = ratio < 0.34 ? 'var(--diff-low)' : ratio < 0.67 ? 'var(--diff-mid)' : 'var(--diff-high)';
    }
  }
  const label = (min === max) ? `${min}` : `${min}\u2013${max}`;
  return `<span class="diff-badge" style="color:${color};border-color:${color}">\u26a1 ${label}</span>`;
}
function relItem(id){ const t=BY_ID[id]; if(!t) return ''; const d=domainOf(t); return `<div class="rel-item" onclick="openDetail('${id}', ${state.view==='web'})"><span class="sw" style="background:${d.hex}"></span>${t.name}</div>`; }
function openDetail(id, fromWeb){
  state.selected=id; const c=BY_ID[id]; const dom=domainOf(c); const grp=groupOf(c);
  const body=document.getElementById('detail-body');
  const combos = comboEdgesFor(id);
  const related = Array.from(relatedOf(id));
  const comboHTML = combos.length ? (() => {
    const seen = new Set();
    const rows = [];
    combos.forEach(e => {
      const ids = e.ids;
      const key = ids.sort().join('::');
      if (seen.has(key)) return;
      seen.add(key);
      const others = ids.filter(i => i !== id);
      const names = others.map(i => { const o = BY_ID[i]; return o ? o.name : i; });
      const sign = e.extra > 0 ? '+' : '';
      const label = names.length > 1 ? names.join(', ') + ' (all required)' : names[0];
      const firstOther = others[0];
      return rows.push(`<div class="rel-item" style="border-color:#e0925f66" onclick="openDetail('${firstOther}', ${state.view==='web'})"><span class="sw" style="background:#e0925f"></span>${sign}${e.extra} with ${label}</div>`);
    });
    return rows.join('');
  })() : `<div class="empty-note">No known difficulty interactions.</div>`;
  const query = encodeURIComponent(c.name+' game design postmortem OR tutorial OR "GDC talk"');
  body.innerHTML = `
    <div class="badge" style="color:${dom.hex};border-color:${dom.hex}">${dom.name}${grp&&grp.kind==='group'?' \u2022 '+grp.name:''}</div>
    <h2>${c.name} ${c.diff? diffBadge(c.diff,c.diff):''}</h2>
    <div class="desc">${c.desc}</div>
    <div class="sect"><h4>Requires</h4>${c.deps.length? c.deps.map(d=> Array.isArray(d) ? `<div class="rel-item" style="opacity:.7;border-style:dashed"><span class="sw" style="background:var(--text-faint)"></span>Any of: ${d.map(relItem).join('')}</div>` : relItem(d)).join('') : `<div class="empty-note">No prerequisites.</div>`}</div>
    <div class="sect"><h4>Required by</h4>${(REQUIRED_BY[id]||[]).length? REQUIRED_BY[id].map(relItem).join('') : `<div class="empty-note">Nothing currently depends on this.</div>`}</div>
    <div class="sect"><h4>Related</h4>${related.length? related.map(relItem).join('') : `<div class="empty-note">None tagged.</div>`}</div>
    <div class="sect"><h4>Difficulty interactions</h4>${comboHTML}</div>
    ${(CHILDREN_OF[id]||[]).length? `<div class="sect"><h4>Sub-concepts</h4>${(CHILDREN_OF[id]||[]).map(relItem).join('')}</div>`:''}
    <div class="sect"><a class="lookup" onclick="window.open('https://www.google.com/search?q=${query}','_blank')">\ud83d\udd0e Look up resources on this \u2192</a></div>
  `;
  document.getElementById('detail').classList.add('open');
  if(state.view==='web') highlightNeighbors(id);
}
document.getElementById('detail-close').onclick=()=>{ document.getElementById('detail').classList.remove('open'); state.selected=null; clearHighlight(); };

/* =============================================================
   WIZARD (shared engine for Design-a-Game / Design-a-Feature)
============================================================= */
const STEPS = (()=>{
  const steps=[];
  DOMAINS.forEach(dom=>{
    const groups = GROUPS.filter(g=>g.parent===dom.id);
    if(groups.length){ groups.forEach(g=> steps.push({id:g.id, title:g.name, domain:dom, select:g.select})); }
    else { steps.push({id:dom.id, title:dom.name, domain:dom, select:dom.select}); }
  });
  return steps;
})();
function optionsFor(step){ var options = CONCEPTS.filter(c=>c.parent===step.id); if (step.domain.id === "d_dimensions") return options; return options.sort((a,b)=>a.name.localeCompare(b.name)); }

function answerStore(){ return studio.context==='feature' && studio.activeFeature>=0 ? studio.design.features[studio.activeFeature] : studio.design; }
function baseSelectedIds(){
  if(studio.context!=='feature' || studio.activeFeature<0) return new Set();
  const s=new Set(); Object.values(studio.design.answers).forEach(arr=>arr.forEach(a=>{ if(a.type==='concept') s.add(a.id); })); return s;
}
function ownSelectedIds(store){ const s=new Set(); Object.values(store.answers).forEach(arr=>arr.forEach(a=>{ if(a.type==='concept') s.add(a.id); })); return s; }
function allSelectedIds(){ const store=answerStore(); return new Set([...baseSelectedIds(), ...ownSelectedIds(store)]); }

function isAnswered(store, stepId){ const a=store.answers[stepId]; return a && a.length>0; }

function diffForOption(opt){
  const selected = allSelectedIds();
  const base = opt.diff||0;
  let depsExtra = 0;
  if (opt.parent !== 'd_genre') (opt.deps||[]).forEach(d => {
    if (Array.isArray(d)) {
      if (!d.some(id => selected.has(id))) d.forEach(id => { const dep = BY_ID[id]; if (dep) depsExtra += dep.diff || 0; });
    } else if (!selected.has(d)) { const dep = BY_ID[d]; if (dep) depsExtra += dep.diff || 0; }
  });
  let lockedExtra=0; const lockedNotes=[];
  comboEdgesFor(opt.id).forEach(e=>{
    const ids=e.ids, others=ids.filter(i=>i!==opt.id);
    if(others.every(i=>selected.has(i))){ lockedExtra+=e.extra; lockedNotes.push({other:others[0],extra:e.extra,note:e.note}); }
  });
  const store=answerStore();
  const answeredSteps = new Set(Object.keys(store.answers).filter(k=>{ const s=STEPS.find(st=>st.id===k); return isAnswered(store,k) && s&&s.select==='single'; }));
  if(studio.context==='feature'){ Object.keys(studio.design.answers).forEach(k=>{ const s=STEPS.find(st=>st.id===k); if(isAnswered(studio.design,k) && s&&s.select==='single') answeredSteps.add(k); }); }
  const perStepMaxPos={}; const perStepMaxNeg={}; const pendingNotes=[];
  const seenPendingCombo=new Set();
  comboEdgesFor(opt.id).forEach(e=>{
    const ids=e.ids, others=ids.filter(i=>i!==opt.id);
    if(others.every(i=>selected.has(i))) return; // locked, handled above
    const unselected = others.filter(i=>!selected.has(i));
    const key=ids.sort().join('::');
    if(seenPendingCombo.has(key)) return;
    seenPendingCombo.add(key);
    unselected.forEach(other=>{
      const on=BY_ID[other]; if(!on) return; const stepId=on.parent;
      if(answeredSteps.has(stepId)) return;
      const st=STEPS.find(s=>s.id===stepId);
      if(st&&st.select==='single'){
        if(e.extra > 0) perStepMaxPos[stepId]=Math.max(perStepMaxPos[stepId]||0, e.extra);
        if(e.extra < 0) perStepMaxNeg[stepId]=Math.min(perStepMaxNeg[stepId]||0, e.extra);
      } else {
        if(e.extra > 0) perStepMaxPos[stepId]=(perStepMaxPos[stepId]||0)+e.extra;
        if(e.extra < 0) perStepMaxNeg[stepId]=(perStepMaxNeg[stepId]||0)+e.extra;
      }
      pendingNotes.push({other,extra:e.extra,note:e.note});
    });
  });
  const maxPendingPos=Object.values(perStepMaxPos).reduce((a,b)=>a+b,0);
  const maxPendingNeg=Object.values(perStepMaxNeg).reduce((a,b)=>a+b,0);
  return {min: base+depsExtra+lockedExtra+maxPendingNeg, max: base+depsExtra+lockedExtra+maxPendingPos, lockedNotes, pendingNotes};
}
function isLocked(opt){
  const selected=allSelectedIds();
  return (opt.deps||[]).some(d=> Array.isArray(d) ? !d.some(id=>selected.has(id)) : !selected.has(d));
}
function lockReason(opt){
  const selected=allSelectedIds();
  return (opt.deps||[]).filter(d=> Array.isArray(d) ? !d.some(id=>selected.has(id)) : !selected.has(d))
    .map(d=> Array.isArray(d) ? d.map(id=>BY_ID[id]?BY_ID[id].name:id).join(' or ') : (BY_ID[d]?BY_ID[d].name:d))
    .join(', ');
}

function calculateTotalDiff() {
  let total = 0;
  const selected = allSelectedIds();
  selected.forEach(id => {
    const c = BY_ID[id];
    if (c && domainOf(c).id !== 'd_genre') {
      total += c.diff || 0;
    }
  });
  COMBO_DIFFICULTY.forEach(e => {
    const ids = e.ids;
    if (ids.every(id => selected.has(id))) {
      const allC = ids.map(id => BY_ID[id]).filter(Boolean);
      if (allC.length >= 2 && allC.every(c => domainOf(c).id !== 'd_genre')) {
        total += e.extra;
      }
    }
  });
  return total;
}

function renderWizardShell(containerId){
  const container = document.getElementById(containerId);
  container.innerHTML = `<div class="wizard-container"><div class="step-nav"></div><div class="wizard-main"></div></div>`;
  renderStepNav();
  renderStepBody();
}
function renderStepNav(){
  const nav = document.querySelector('.view.active .step-nav'); if(!nav) return;

    }

    let lastDomain=null;
    STEPS.forEach(step=>{
      if(step.domain.id!==lastDomain){ lastDomain=step.domain.id; const h=document.createElement('div'); h.className='step-domain-h'; h.style.color=step.domain.hex; h.textContent=step.domain.name; nav.appendChild(h); }
      const answered = isAnswered(store, step.id);
      const btn=document.createElement('button');
      btn.className='step-btn'+(answered?' done':'')+(studio.currentStep===step.id?' current':'');
      btn.dataset.stepId = step.id;
      btn.innerHTML = `<span class="mk">${answered?'\u2713':''}</span>${step.title}`;
      btn.onclick=()=>{ studio.currentStep=step.id; renderStepNav(); renderStepBody(); };
      nav.appendChild(btn);
    });
  } else {
    var progMain = nav.querySelector('[data-prog-main]');
    if(progMain) progMain.textContent = done+'/'+total+' steps touched';
    var progFeat = nav.querySelector('[data-prog-feat]');
    if(progFeat && studio.context==='feature') progFeat.innerHTML = 'Feature: <b style="color:var(--text)">'+(studio.activeFeature>=0?studio.design.features[studio.activeFeature].name:'(none selected)')+'</b>';
    STEPS.forEach(step=>{
      const btn = nav.querySelector('[data-step-id="'+step.id+'"]');
      if(!btn) return;
      const answered = isAnswered(store, step.id);
      var newClass = 'step-btn'+(answered?' done':'')+(studio.currentStep===step.id?' current':'');
      if(btn.className !== newClass) btn.className = newClass;
      var mk = btn.querySelector('.mk');
      var newMk = answered ? '\u2713' : '';
      if(mk.textContent !== newMk) mk.textContent = newMk;
    });
  }
}
function currentAnswersFor(step){ const store=answerStore(); return store.answers[step.id]||[]; }
function setAnswer(step, arr){ const store=answerStore(); store.answers[step.id]=arr; }

function toggleAnswer(step, concept){
  const store=answerStore(); const arr = store.answers[step.id] ? [...store.answers[step.id]] : [];
  const idx = arr.findIndex(a=>a.type==='concept'&&a.id===concept.id);
  if(idx>=0){ 
    arr.splice(idx,1);
    // Uncheck all descendants automatically
    const descendants = new Set();
    function addDesc(id) { (CHILDREN_OF[id]||[]).forEach(cid => { descendants.add(cid); addDesc(cid); }); }
    addDesc(concept.id);
    store.answers[step.id] = arr.filter(a => !(a.type==='concept' && descendants.has(a.id)));
  }
  else {
    if(step.select==='single'){ store.answers[step.id]=[{type:'concept',id:concept.id}]; }
    else { arr.push({type:'concept', id:concept.id}); store.answers[step.id]=arr; }
    const q = [concept.id];
    while(q.length){
      const c = BY_ID[q.shift()];
      if(c && c.deps){
        c.deps.forEach(d=>{
          if(Array.isArray(d)){
            // Either-or group: don't auto-select; user must pick
          } else if(!allSelectedIds().has(d)){
            const depC = BY_ID[d]; if(!depC) return;
            const depS = STEPS.find(s=>s.id===depC.parent);
            if(depS){
              if(depS.select==='single'){ store.answers[depS.id]=[{type:'concept',id:d}]; }
              else { const dArr = store.answers[depS.id]?[...store.answers[depS.id]]:[]; dArr.push({type:'concept',id:d}); store.answers[depS.id]=dArr; }
              q.push(d);
            }
          }
        });
      }
    }
  }
  renderStepNav(); renderStepBody();
}

function renderStepBody(){
  const main = document.querySelector('.view.active .wizard-main'); if(!main) return;
  if(!studio.currentStep){
    if(studio.context==='feature' && studio.activeFeature<0){ renderFeaturePicker(main); return; }
    studio.currentStep = STEPS[0].id;
  }
  if(studio.currentStep==='__review__'){ renderReview(main); return; }
  if(studio.currentStep==='__llmSetup__'){ renderLLMInterface(); return; }
  const step = STEPS.find(s=>s.id===studio.currentStep);
  const store = answerStore();
  const answered = currentAnswersFor(step);
  const answeredIds = new Set(answered.filter(a=>a.type==='concept').map(a=>a.id));

  let html = `<div class="wizard-content">
    <div class="step-title">${step.title}</div>
    <div class="step-sub">${step.select==='single'?'Pick exactly one.':'Pick any that apply.'}</div>`;

  if(studio.context==='feature'){
    const baseAns = studio.design.answers[step.id]||[];
    if(baseAns.length){
      html += `<div class="inherited-box"><b>Already in your base game:</b> ${baseAns.map(a=> a.type==='concept'? (BY_ID[a.id]?BY_ID[a.id].name:a.id) : a.name).join(', ')}</div>`;
    }
  }

  main.innerHTML = html + `</div>`;
  const content = main.querySelector('.wizard-content');

  const list = document.createElement('div');

  // Gather visible options (including sub-entries of checked parents)
  const visibleOpts = [];
  const allSel = allSelectedIds();
  function addOpt(opt, level) {
    visibleOpts.push({opt, level});
    if (allSel.has(opt.id)) {
      (CHILDREN_OF[opt.id]||[]).forEach(cid => {
        if (BY_ID[cid]) addOpt(BY_ID[cid], level + 1);
      });
    }
  }
  optionsFor(step).forEach(o => addOpt(o, 0));

  // Calculate difficulty range for this screen
  const diffs = visibleOpts.map(vo => diffForOption(vo.opt).max).filter(v => v !== undefined);
  const sMin = diffs.length ? Math.min(...diffs) : 0;
  const sMax = diffs.length ? Math.max(...diffs) : 0;

  // Build map of unchecked options -> checked items that depend on them (broken deps)
  const stepOptIds = new Set(optionsFor(step).map(o => o.id));
  const brokenDeps = new Map();
  visibleOpts.forEach(vo => {
    if (!answeredIds.has(vo.opt.id)) {
      const dependents = [];
      allSel.forEach(selId => {
        const sel = BY_ID[selId];
        if (!sel || !sel.deps) return;
        sel.deps.forEach(d => {
          if (d === vo.opt.id) dependents.push(sel);
          else if (Array.isArray(d) && d.includes(vo.opt.id)) {
            // Either-or group: only broken if NONE of the group are selected
            if (!d.some(id => allSel.has(id))) dependents.push(sel);
          }
        });
      });
      if (dependents.length) brokenDeps.set(vo.opt.id, dependents);
    }
  });

  visibleOpts.forEach(vo => {
    const opt = vo.opt;
    const level = vo.level;
    const locked = isLocked(opt);
    
    // Check Mutex (bidirectional: either side listing the other is enough)
    let mutexConflict = (opt.mutex || []).find(m => allSel.has(m));
    if (!mutexConflict) {
      for (const selId of allSel) {
        const sel = BY_ID[selId];
        if (sel && sel.mutex && sel.mutex.includes(opt.id)) {
          mutexConflict = selId;
          break;
        }
      }
    }
    const isMutexed = !!mutexConflict;

    const checked = answeredIds.has(opt.id);
    const inherited = studio.context === 'feature' && allSel.has(opt.id) && !checked;
    const d = diffForOption(opt);
    const row = document.createElement('div');
    row.className = 'opt-row' + (checked ? ' checked' : '') + (inherited ? ' inherited' : '') + (isMutexed ? ' locked' : '');
    if (level > 0) {
      row.style.marginLeft = (level * 20) + 'px';
      row.style.borderLeft = '3px solid var(--line)';
    }
    
    row.innerHTML = `<input type="${step.select==='single'?'radio':'checkbox'}" ${checked||inherited?'checked':''} ${inherited||isMutexed?'disabled':''}>
      <div class="ob"><div class="oname">${opt.name} ${(opt.diff||d.lockedNotes.length||d.pendingNotes.length)?diffBadge(d.min,d.max,sMin,sMax):''}</div>
      <div class="odesc">${opt.desc}</div>
      ${locked? `<div class="olock">\ud83d\udd12 needs: ${lockReason(opt)}</div>`:''}
      ${isMutexed? `<div class="olock" style="color:var(--diff-high)">\u26a0\ufe0f Cannot mix with: ${BY_ID[mutexConflict]?BY_ID[mutexConflict].name:mutexConflict}</div>`:''}
       ${(d.lockedNotes.length||d.pendingNotes.length) ? `<div class="olock" style="color:var(--text-dim)">${[...d.lockedNotes.map(n=>{ const s=n.extra>0?'+':''; return s+n.extra+' from '+(BY_ID[n.other]?BY_ID[n.other].name:n.other);}), ...d.pendingNotes.map(n=>{ const s=n.extra>0?'+':''; return 'up to '+s+n.extra+' depending on '+(BY_ID[n.other]?BY_ID[n.other].name:n.other);})].join(' \u00b7 ')}</div>`:''}
      </div>`;
      
    // Only toggle on checkbox click. Open detail on text click.
    row.querySelector('.oname').onclick = (ev) => { ev.stopPropagation(); openDetail(opt.id, false); };
    row.querySelector('.odesc').onclick = (ev) => { ev.stopPropagation(); openDetail(opt.id, false); };
    row.querySelector('input').onclick = (ev) => { if (inherited || isMutexed) ev.preventDefault(); else toggleAnswer(step, opt); };
    list.appendChild(row);

    // Show broken dependency warnings beneath unchecked items
    const dependents = brokenDeps.get(opt.id);
    if (dependents) {
      dependents.forEach(dep => {
        const depStep = STEPS.find(s => s.id === dep.parent);
        const wrow = document.createElement('div');
        wrow.className = 'opt-row broken-dep';
        wrow.style.marginLeft = ((level + 1) * 20) + 'px';
        wrow.style.borderLeft = '3px solid var(--diff-high)';
        wrow.innerHTML = `<input type="checkbox" checked>
          <div class="ob"><div class="oname">${dep.name} <span style="font-weight:400;font-size:10px;color:var(--text-faint)">${depStep?'· '+depStep.title:''}</span></div>
          <div class="odesc">${dep.desc}</div>
          <div class="olock">\u26a0\ufe0f Requires ${opt.name} which is unchecked</div></div>`;
        wrow.querySelector('input').onclick = (ev) => { ev.stopPropagation(); toggleAnswer(depStep, dep); };
        wrow.querySelector('.oname').onclick = (ev) => { ev.stopPropagation(); openDetail(dep.id, false); };
        wrow.querySelector('.odesc').onclick = (ev) => { ev.stopPropagation(); openDetail(dep.id, false); };
        if (depStep) {
          wrow.querySelector('.olock').onclick = (ev) => { ev.stopPropagation(); studio.currentStep = depStep.id; renderStepNav(); renderStepBody(); };
          wrow.querySelector('.olock').style.cursor = 'pointer';
        }
        list.appendChild(wrow);
      });
    }

    // Show either-or options inline beneath checked items with unsatisfied either-or deps
    if (answeredIds.has(opt.id) && opt.deps) {
      opt.deps.forEach(d => {
        if (!Array.isArray(d)) return;
        if (d.some(id => allSel.has(id))) return; // already satisfied
        d.forEach(optId => {
          const oc = BY_ID[optId]; if (!oc) return;
          const ocStep = STEPS.find(s => s.id === oc.parent);
          const ocChecked = allSel.has(optId);
          const wrow = document.createElement('div');
          wrow.className = 'opt-row' + (ocChecked ? ' checked' : '');
          wrow.style.marginLeft = ((level + 1) * 20) + 'px';
          wrow.style.borderLeft = '3px solid var(--accent)';
          wrow.innerHTML = `<input type="checkbox" ${ocChecked?'checked':''}>
            <div class="ob"><div class="oname">${oc.name} <span style="font-weight:400;font-size:10px;color:var(--text-faint)">${ocStep?' · '+ocStep.title:''}</span></div>
            <div class="odesc">${oc.desc}</div></div>`;
          wrow.querySelector('input').onclick = (ev) => { ev.stopPropagation(); if (ocStep) toggleAnswer(ocStep, oc); };
          wrow.querySelector('.oname').onclick = (ev) => { ev.stopPropagation(); openDetail(optId, false); };
          wrow.querySelector('.odesc').onclick = (ev) => { ev.stopPropagation(); openDetail(optId, false); };
          list.appendChild(wrow);
        });
      });
    }
  });
  content.appendChild(list);

  const fib = document.createElement('div'); fib.className = 'fib-wrap';
  fib.innerHTML = `<label>Not seeing it? Fill in your own</label>
    <div id="fib-list" style="display:flex;flex-direction:column;gap:6px;margin-top:8px;"></div>
    <div class="suggest-box" id="fib-suggest"></div>`;
  content.appendChild(fib);
  
  content.insertAdjacentHTML('beforeend', `<div class="wizard-bottombar">
      <textarea id="step-notes" placeholder="Notes for this step...">${(answerStore().notes[step.id]||'')}</textarea>
      <div class="diff-total" title="Total difficulty (excluding genre)">\u26a1 ${calculateTotalDiff()}</div>
      <button class="btn" onclick="randomizeStep()">\ud83c\udfb2 Random pick</button>
      <button class="btn" onclick="prevStep()">\u2190 Prev</button>
      <button class="btn" onclick="nextStep()">Next \u2192</button>
    </div>`);

  main.querySelector('#step-notes').addEventListener('input', (e) => {
    answerStore().notes[step.id] = e.target.value;
  });

  const fibList = fib.querySelector('#fib-list');

  function renderFibInputs() {
    fibList.innerHTML = '';
    const customs = answered.filter(a => a.type === 'custom');
    customs.forEach(c => {
      const input = document.createElement('input');
      input.type = 'text'; input.className = 'fib-input'; input.value = c.name;
      input.dataset.id = c.id;
      fibList.appendChild(input);
    });
    const emptyInput = document.createElement('input');
    emptyInput.type = 'text'; emptyInput.className = 'fib-input empty-fib'; emptyInput.placeholder = 'Type a custom concept...';
    fibList.appendChild(emptyInput);

    fibList.querySelectorAll('.fib-input').forEach(inp => {
      inp.addEventListener('input', handleFibInput);
    });
  }

  function handleFibInput(e) {
    const inputs = Array.from(fibList.querySelectorAll('.fib-input'));
    const newCustoms = [];

    inputs.forEach(inp => {
      const val = inp.value;
      if (val.trim()) {
        if (!inp.dataset.id) inp.dataset.id = 'custom_' + Date.now() + Math.random();
        newCustoms.push({
          type: 'custom',
          id: inp.dataset.id,
          name: val.trim(),
          desc: ''
        });
      }
    });

    const store = answerStore();
    const nonCustoms = (store.answers[step.id] || []).filter(a => a.type !== 'custom');
    store.answers[step.id] = [...nonCustoms, ...newCustoms];

    const lastInput = inputs[inputs.length - 1];
    if (lastInput.value.trim() !== '') {
      const emptyInput = document.createElement('input');
      emptyInput.type = 'text'; emptyInput.className = 'fib-input empty-fib'; emptyInput.placeholder = 'Type a custom concept...';
      emptyInput.addEventListener('input', handleFibInput);
      fibList.appendChild(emptyInput);
    }

    // Suggestions logic
    const box = fib.querySelector('#fib-suggest');
    box.innerHTML = '';
    const activeInput = e.target;
    if (activeInput.value.trim().length >= 2) {
      findSuggestions(activeInput.value, step.id).forEach(s => {
        const chip = document.createElement('div'); chip.className = 'suggest-chip';
        chip.textContent = s.sameGroup ? `Use existing: ${s.node.name}` : `Did you mean: ${(groupOf(s.node)||{}).name||''} \u2192 ${s.node.name}?`;
        chip.onclick = () => {
          if (s.sameGroup) { toggleAnswer(step, s.node); }
          else {
            const targetStep = STEPS.find(st => st.id === s.node.parent);
            if (targetStep) {
              const arr = answerStore().answers[targetStep.id] ? [...answerStore().answers[targetStep.id]] : [];
              if (!arr.some(a => a.type === 'concept' && a.id === s.node.id)) {
                arr.push({type: 'concept', id: s.node.id});
                answerStore().answers[targetStep.id] = arr;
              }
            }
          }
          activeInput.value = '';
          handleFibInput({target: activeInput});
          renderStepNav(); renderStepBody();
        };
        box.appendChild(chip);
      });
    }
  }

  renderFibInputs();
}

function randomizeStep(){
  const step=STEPS.find(s=>s.id===studio.currentStep); if(!step) return;
  const options = optionsFor(step);
  if(!options.length) return;
  if(step.select==='single'){ toggleAnswer(step, options[Math.floor(Math.random()*options.length)]); }
  else { const n=Math.min(options.length, 1+Math.floor(Math.random()*2)); const shuffled=[...options].sort(()=>Math.random()-.5).slice(0,n); shuffled.forEach(o=>{ const already=(answerStore().answers[step.id]||[]).some(a=>a.type==='concept'&&a.id===o.id); if(!already) toggleAnswer(step,o); }); }
}

  });

  } else {
    resultsContainer.innerHTML = '';

function toggleInspireFilter(colKey, filterId) {
  const filters = state.inspiration[colKey].filters;
  if (filters.has(filterId)) {
    filters.delete(filterId);
  } else {
    filters.add(filterId);
  }
  generateInspireResults(colKey);
  renderInspiration();
}

function generateInspireResults(colKey) {
  const colState = state.inspiration[colKey];
  const pool = [];

  colState.filters.forEach(fId => {
    const domain = DOMAINS.find(d => d.id === fId);
    if (domain) {
      // It's a GCA Domain
      CONCEPTS.filter(c => domainOf(c).id === domain.id).forEach(c => {
        pool.push({
          name: c.name,
          typeLabel: 'GCA: ' + domain.name,
          hex: domain.hex
        });
      });
    } else if (TAGGED_WORDS[fId]) {
      // It's a tagged word list
      TAGGED_WORDS[fId].forEach(word => {
        pool.push({
          name: word,
          typeLabel: 'Word: ' + fId,
          hex: 'var(--accent)'
        });
      });
    }
  });

  if (pool.length === 0) {
    colState.results = [];
    return;
  }

  // Draw 3 random distinct entries
  const selected = [];
  const tempPool = [...pool];
  const count = Math.min(3, tempPool.length);

  for (let i = 0; i < count; i++) {
    const randIdx = Math.floor(Math.random() * tempPool.length);
    selected.push(tempPool.splice(randIdx, 1)[0]);
  }

  colState.results = selected;
}

/* ---- Prompt Builder ---- */
function buildWizardPrompt(userPrompt, step, options, completedSteps, allSel){
  var sb = [];
  sb.push('You are filling out a game design wizard on behalf of a user. The user wants to design this game:');
  sb.push('<UserDesignRequest>');
  sb.push(userPrompt);
  sb.push('</UserDesignRequest>');
  sb.push('');
  sb.push('Current step: ' + step.title);
  sb.push('Selection mode: ' + step.select);
  sb.push('');
  if(completedSteps.size > 0){
    sb.push('Already completed steps:');
    completedSteps.forEach(function(ids, stepId){
      if(ids.length > 0){
        var st = STEPS.find(function(s){return s.id===stepId;});
        sb.push('  '+(st?st.title:stepId)+': '+ids.join(', '));
      }
    });
    sb.push('');
  }
  sb.push('Available options for this step:');
  options.forEach(function(opt){
    var prefix = opt.isChild ? '    (child of '+(BY_ID[opt.parent]?BY_ID[opt.parent].name:opt.parent)+') - ' : '  - ';
    var suffix = allSel.has(opt.id) ? ' (already added as required; no need to pick this)' : '';
    sb.push(prefix+opt.id+': '+opt.name+' ('+opt.desc+') [diff:'+(opt.diff||0)+']'+suffix);
  });
  sb.push('  - Other: <custom text> (use this if none of the above fit)');
  sb.push('');
  sb.push('Rules:');
  sb.push('  - Selection mode is "'+step.select+'": '+(step.select==='single'?'pick exactly ONE option':'pick any number of options that apply'));
  sb.push('  - Options marked "(child of X)" are nested under their parent; picking a child also requires its parent');
  sb.push('  - If you choose "Other", respond with "Other: <your custom text>"');
  sb.push('  - You can mix predefined IDs and "Other" in multi-select mode');
  if(step.select !== 'single') sb.push('  - If none apply, say "none"');
  sb.push('  - Do not include any explanation beyond the IDs and optional Other text');
  sb.push('');
  sb.push('Respond with ONLY the IDs of the option(s) you select, separated by commas. Example: "g_simulation, Other: Farm management" or just "g_simulation" or "Other: My custom genre".');
  return sb.join('\n');
}

/* ---- Options with children ---- */
function optionsForWithChildren(step){
  var result = [];
  optionsFor(step).forEach(function(c){
    result.push({id:c.id, name:c.name, desc:c.desc, diff:c.diff||0, parent:null, isChild:false});
    (CHILDREN_OF[c.id]||[]).forEach(function(kidId){
      var kid = BY_ID[kidId];
      if(kid) result.push({id:kid.id, name:kid.name, desc:kid.desc, diff:kid.diff||0, parent:c.id, isChild:true});
    });
  });
  return result;
}

/* ---- Response Parser ---- */
function parseSelectedIds(response, options){
  var validIds = new Set(options.map(function(o){return o.id;}));
  var selected = [];
  var customs = [];
  var otherRe = /Other:\s*(.+)/gi;
  var m;
  while((m=otherRe.exec(response))!==null){
    var t = m[1].trim();
    if(t) customs.push(t);
  }
  var parts = response.split(/[,\n\r;]+/);
  parts.forEach(function(part){
    var id = part.trim();
    if(id.toLowerCase().startsWith('other:')) return;
    if(validIds.has(id) && !selected.includes(id)) selected.push(id);
    else {
      var match = options.find(function(o){
        return o.name.toLowerCase().includes(id.toLowerCase()) || id.toLowerCase().includes(o.name.toLowerCase());
      });
      if(match && !selected.includes(match.id)) selected.push(match.id);
    }
  });
  return {ids:selected, customs:customs};
}

/* ---- Basic Degenerate Loop Detection ---- */
function hasRepeatedWord(text, threshold){
  var counts = {};
  var words = text.split(' ').filter(function(w){return w.length>0;});
  for(var i=0;i<words.length;i++){
    var w = words[i].toLowerCase();
    counts[w] = (counts[w]||0)+1;
    if(counts[w] > threshold) return true;
  }
  return false;
}

/* ---- API Client ---- */
async function llmChatCompletion(cfg, prompt){
  var url = cfg.baseUrl.replace(/\/+$/,'')+'/v1/chat/completions';
  var body = JSON.stringify({
    model: cfg.model || undefined,
    messages: [{role:'user', content:prompt}],
    max_tokens: parseInt(cfg.maxTokens)||2048,
    temperature: parseFloat(cfg.temperature)||0.2
  });
  var headers = {'Content-Type':'application/json'};
  if(cfg.apiKey) headers['Authorization'] = 'Bearer '+cfg.apiKey;
  var startedAt = Date.now();
  var resp = await fetch(url, {method:'POST', headers:headers, body:body, signal:arguments[2]});
  var data = await resp.json();
  var choice = data.choices&&data.choices[0]?data.choices[0]:null;
  var msg = choice&&choice.message?choice.message:{content:''};
  var content = (msg.content||'').trim();
  var reasoning = msg.reasoning_content || msg.reasoning || '';
  var usage = data.usage||{};
  var tokens = {
    prompt: usage.prompt_tokens||0,
    completion: usage.completion_tokens||0,
    total: usage.total_tokens||0
  };
  var completedAt = Date.now();
  var durationMs = completedAt - startedAt;
  var timing = {
    started: startedAt,
    completed: completedAt,
    durationMs: durationMs,
    prompt_per_second: durationMs>0 ? ((usage.prompt_tokens||0)/durationMs*1000).toFixed(1) : '0',
    predicted_per_second: durationMs>0 ? ((usage.completion_tokens||0)/durationMs*1000).toFixed(1) : '0'
  };
  var degenerate = hasRepeatedWord(content, 25);
  return {content:content, reasoning:reasoning, tokens:tokens, timing:timing, degenerate:degenerate, httpStatus:resp.status, raw:JSON.stringify(data)};
}
